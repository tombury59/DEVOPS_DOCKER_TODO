server {
  listen 80;
  server_name _;

  # Frontend (React build served by container on port 80)
  location / {
    proxy_pass http://frontend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
  }

  # Cache assets
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
    proxy_pass http://frontend:80;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    access_log off;
  }

  # Tasks API
  location /api/tasks/ {
    proxy_pass http://tasks-service:3001/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_read_timeout 90s;
  }

  # Health for tasks
  location = /api/tasks/health {
    proxy_pass http://tasks-service:3001/health;
  }

  # Stats API
  location /api/stats/ {
    proxy_pass http://stats-service:3002/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_read_timeout 90s;
  }

  # Health for stats
  location = /api/stats/health {
    proxy_pass http://stats-service:3002/health;
  }

  # Local Docker Registry proxy
  location /registry/ {
    proxy_pass http://registry:5000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_read_timeout 90s;
  }

  location /v2/ {
    proxy_pass http://registry:5000/v2/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
