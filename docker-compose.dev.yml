version: '3.8'

# Docker Compose pour le développement
# - monte le code en volumes pour rechargement à chaud
# - utilise des builds locaux
# - cherche les variables dans un fichier .env.dev (non commité)

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmanager-db-dev
    env_file: .env.dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./tasks-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskmanager-network
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
        reservations:
          cpus: '0.50'
          memory: 512M

  tasks-service:
    build:
      context: ./tasks-service
      dockerfile: Dockerfile
      target: dev
    image: tasks-service:dev
    container_name: taskmanager-tasks-service-dev
    env_file: .env.dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: ${TASKS_SERVICE_PORT}
      NODE_ENV: development
    ports:
      - "${TASKS_SERVICE_PORT}:${TASKS_SERVICE_PORT}"
    volumes:
      - ./tasks-service:/app:cached
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${TASKS_SERVICE_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - taskmanager-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  stats-service:
    build:
      context: ./stats-service
      dockerfile: Dockerfile
      target: dev
    image: stats-service:dev
    container_name: taskmanager-stats-service-dev
    env_file: .env.dev
    environment:
      TASKS_SERVICE_URL: http://tasks-service:${TASKS_SERVICE_PORT}
      PORT: ${STATS_SERVICE_PORT}
      NODE_ENV: development
    ports:
      - "${STATS_SERVICE_PORT}:${STATS_SERVICE_PORT}"
    volumes:
      - ./stats-service:/app:cached
      - /app/node_modules
    depends_on:
      tasks-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${STATS_SERVICE_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - taskmanager-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskmanager-frontend-dev
    env_file: .env.dev
    environment:
      NODE_ENV: development
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - tasks-service
      - stats-service
    volumes:
      - ./frontend:/app:cached
    networks:
      - taskmanager-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M

  adminer:
    image: adminer:latest
    container_name: taskmanager-adminer-dev
    env_file: .env.dev
    ports:
      - "${ADMINER_PORT}:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: ${ADMINER_DEFAULT_SERVER}
    networks:
      - taskmanager-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M

volumes:
  postgres_data:
    driver: local

networks:
  taskmanager-network:
    driver: bridge
